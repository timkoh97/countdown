<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LHR → SIN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B1220;
    --bg2:#111A2E;
    --gold:#E8B95B;
    --ink:#F2EFE9;
    --muted:#7C8AA5;
    --line:#22304A;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'IBM Plex Mono', monospace;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:6vh 5vw;
  }

  /* Route line */
  .route{
    width:100%;
    max-width:520px;
    margin-bottom:5vh;
  }
  .route-labels{
    display:flex;
    justify-content:space-between;
    font-size:0.7rem;
    letter-spacing:0.15em;
    color:var(--muted);
    margin-bottom:8px;
  }
  .route-track{
    position:relative;
    height:1px;
    background:var(--line);
  }
  .route-track::before,
  .route-track::after{
    content:'';
    position:absolute;
    top:50%;
    width:6px;
    height:6px;
    border-radius:50%;
    background:var(--muted);
    transform:translateY(-50%);
  }
  .route-track::before{ left:0; }
  .route-track::after{ right:0; }
  .plane{
    position:absolute;
    top:50%;
    transform:translate(-50%,-50%);
    font-size:0.85rem;
    color:var(--gold);
    transition:left 1s linear;
  }

  h1{
    font-family:'Fraunces', serif;
    font-weight:300;
    font-size:clamp(1.6rem, 4vw, 2.4rem);
    margin:0 0 4px 0;
    text-align:center;
    color:var(--ink);
  }
  h1 em{
    font-style:normal;
    font-weight:500;
    color:var(--gold);
  }
  .subline{
    color:var(--muted);
    font-size:0.85rem;
    letter-spacing:0.08em;
    text-align:center;
    margin-bottom:6vh;
  }

  /* Split-flap board */
  .board-wrap{
    flex:1 1 auto;
    display:flex;
    align-items:center;
    justify-content:center;
    width:100%;
  }
  .board{
    display:flex;
    gap:clamp(10px, 2.5vw, 28px);
  }
  .unit{
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .flip{
    background:var(--bg2);
    border:1px solid var(--line);
    border-radius:6px;
    padding:0.4em 0;
    width:clamp(56px, 12vw, 92px);
    text-align:center;
    font-size:clamp(1.8rem, 6vw, 3.2rem);
    font-weight:600;
    color:var(--ink);
    letter-spacing:0.02em;
    font-variant-numeric:tabular-nums;
    box-shadow:0 1px 0 rgba(255,255,255,0.04) inset, 0 6px 16px rgba(0,0,0,0.35);
    transition:color 0.3s ease;
  }
  .flip.tick{
    color:var(--gold);
  }
  .unit-label{
    margin-top:10px;
    font-size:0.65rem;
    letter-spacing:0.2em;
    color:var(--muted);
  }

  .status{
    margin-top:4vh;
    font-size:0.75rem;
    letter-spacing:0.25em;
    color:var(--gold);
    border-top:1px solid var(--line);
    padding-top:1.2em;
    text-align:center;
  }

  .manifest{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(88px, 1fr));
    gap:1px;
    background:var(--line);
    margin-top:4vh;
    max-width:560px;
    width:100%;
  }
  .manifest-item{
    background:var(--bg);
    padding:1.1em 0.6em;
    text-align:center;
  }
  .manifest-num{
    font-size:clamp(1rem, 2.6vw, 1.5rem);
    font-weight:600;
    font-variant-numeric:tabular-nums;
    color:var(--ink);
    letter-spacing:0.02em;
  }
  .manifest-label{
    margin-top:6px;
    font-size:0.6rem;
    letter-spacing:0.16em;
    color:var(--muted);
  }

  .arrived{
    text-align:center;
  }
  .arrived h1{ font-size:clamp(2rem,6vw,3rem); }

  @media (prefers-reduced-motion: reduce){
    .plane{ transition:none; }
  }
</style>
</head>
<body>

<div class="route">
  <div class="route-labels"><span>LON</span><span>SIN</span></div>
  <div class="route-track"><span class="plane" id="plane">✈</span></div>
</div>

<h1>London <em>→</em> Singapore</h1>
<div class="subline">TUE 22 SEP 2026 · 00:10 SGT</div>

<div class="board-wrap" id="boardWrap">
  <div class="board" id="board">
    <div class="unit"><div class="flip" id="d">00</div><div class="unit-label">DAYS</div></div>
    <div class="unit"><div class="flip" id="h">00</div><div class="unit-label">HRS</div></div>
    <div class="unit"><div class="flip" id="m">00</div><div class="unit-label">MIN</div></div>
    <div class="unit"><div class="flip" id="s">00</div><div class="unit-label">SEC</div></div>
  </div>
</div>

<div class="manifest" id="manifest">
  <div class="manifest-item"><div class="manifest-num" id="mDays">0</div><div class="manifest-label">DAYS</div></div>
  <div class="manifest-item"><div class="manifest-num" id="mSleeps">0</div><div class="manifest-label">SLEEPS</div></div>
  <div class="manifest-item"><div class="manifest-num" id="mSundays">0</div><div class="manifest-label">SUNDAYS</div></div>
  <div class="manifest-item"><div class="manifest-num" id="mMinutes">0</div><div class="manifest-label">MINUTES</div></div>
  <div class="manifest-item"><div class="manifest-num" id="mSeconds">0</div><div class="manifest-label">SECONDS</div></div>
</div>

<div class="status" id="status">STATUS: SCHEDULED</div>

<script>
  // Target arrival — 17:10 UK local clock time on Mon 21 Sep 2026.
  // The UK is on BST (UTC+1) at that date (GMT doesn't resume until the clocks
  // change on 25 Oct 2026), so 17:10 local = 16:10 UTC = 00:10 SGT, Tue 22 Sep —
  // matching the flight confirmation.
  const TARGET = new Date("2026-09-21T16:10:00Z");
  const START  = new Date("2026-07-02T00:00:00Z"); // rough trip-window start, for the plane's position

  const dEl = document.getElementById('d');
  const hEl = document.getElementById('h');
  const mEl = document.getElementById('m');
  const sEl = document.getElementById('s');
  const plane = document.getElementById('plane');
  const status = document.getElementById('status');
  const boardWrap = document.getElementById('boardWrap');
  const mDays = document.getElementById('mDays');
  const mSleeps = document.getElementById('mSleeps');
  const mSundays = document.getElementById('mSundays');
  const mMinutes = document.getElementById('mMinutes');
  const mSeconds = document.getElementById('mSeconds');

  function pad(n){ return String(n).padStart(2,'0'); }
  function fmt(n){ return n.toLocaleString('en-GB'); }

  // Calendar-day gap between two dates, counted in the browser's local timezone,
  // with the day boundary set to 6am rather than midnight — a "sleep" only
  // decrements once you've woken up, not at the stroke of midnight.
  const SLEEP_DAY_START_HOUR = 6;
  function calendarDayGap(a, b){
    const offsetMs = SLEEP_DAY_START_HOUR * 3600000;
    const sa = new Date(a.getTime() - offsetMs);
    const sb = new Date(b.getTime() - offsetMs);
    const da = new Date(sa.getFullYear(), sa.getMonth(), sa.getDate());
    const db = new Date(sb.getFullYear(), sb.getMonth(), sb.getDate());
    return Math.round((db - da) / 86400000);
  }

  // Count Sundays strictly between now and the target date (inclusive of target).
  function countSundays(from, to){
    let count = 0;
    let d = new Date(Date.UTC(from.getUTCFullYear(), from.getUTCMonth(), from.getUTCDate()));
    d.setUTCDate(d.getUTCDate() + 1);
    const end = new Date(Date.UTC(to.getUTCFullYear(), to.getUTCMonth(), to.getUTCDate()));
    while(d <= end){
      if(d.getUTCDay() === 0) count++;
      d.setUTCDate(d.getUTCDate() + 1);
    }
    return count;
  }

  function render(){
    const now = new Date();
    const diff = TARGET - now;

    if(diff <= 0){
      document.querySelector('.route').style.display = 'none';
      document.querySelector('h1').style.display = 'none';
      document.querySelector('.subline').style.display = 'none';
      document.getElementById('manifest').style.display = 'none';
      status.style.display = 'none';
      boardWrap.innerHTML = `<div class="arrived"><h1>Touchdown. <em>She's there.</em></h1><div class="subline">Welcome to Singapore.</div></div>`;
      return;
    }

    const totalSec = Math.floor(diff/1000);
    const days = Math.floor(totalSec / 86400);
    const hrs  = Math.floor((totalSec % 86400) / 3600);
    const mins = Math.floor((totalSec % 3600) / 60);
    const secs = totalSec % 60;

    dEl.textContent = pad(days);
    hEl.textContent = pad(hrs);
    mEl.textContent = pad(mins);
    sEl.textContent = pad(secs);

    mDays.textContent = fmt(days);
    mSleeps.textContent = fmt(calendarDayGap(now, TARGET));
    mSundays.textContent = fmt(countSundays(now, TARGET));
    mMinutes.textContent = fmt(Math.floor(diff / 60000));
    mSeconds.textContent = fmt(totalSec);

    // brief gold flash on the seconds flap each tick
    sEl.classList.add('tick');
    setTimeout(()=>sEl.classList.remove('tick'), 250);

    // plane position along the route, based on elapsed time since START
    const totalSpan = TARGET - START;
    const elapsed = now - START;
    const pct = Math.min(100, Math.max(0, (elapsed/totalSpan)*100));
    plane.style.left = pct + '%';

    if(days === 0) status.textContent = 'STATUS: FINAL APPROACH';
    else if(days <= 3) status.textContent = 'STATUS: BOARDING SOON';
    else status.textContent = 'STATUS: SCHEDULED';
  }

  render();
  setInterval(render, 1000);
</script>

</body>
</html>
